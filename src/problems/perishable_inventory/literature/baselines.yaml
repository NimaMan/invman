schema_version: 1
problem: perishable_inventory
registry_owner: src/problems/perishable_inventory
source_of_truth:
  - src/problems/perishable_inventory/references.rs
  - src/problems/perishable_inventory/tests/verification.rs
  - src/problems/perishable_inventory/literature/README.md
entries:
  - id: de_moor2022_m2_exp1_l1_cp7_lifo_exact_slice
    problem: perishable_inventory
    instance_name: de_moor2022_m2_exp1_l1_cp7_lifo
    roles:
      - verification_problem_instance
      - paper_exact_slice
      - published_optimum
      - published_heuristic_validation
    status:
      verification: strict_literature_verified
      comparator_type: published_exact_optimum
      paper_status: ready
      last_reviewed: "2026-06-05"
    source:
      citation: "De Moor, Gijsbrechts, and Boute (2022), EJOR 301(2):535-545; Farrington, Wong, Li, and Utley (2025), Annals of Operations Research 349(3):1609-1638"
      url: https://doi.org/10.1007/s10479-025-06551-6
      table: "Farrington et al. (2025) Table 3; De Moor et al. (2022) m=2 experiment 1 policy table"
      numbers: "Rounded value-iteration mean return, best base-stock level, and 9x9 optimal-policy table."
      source_notes:
        - "The repo labels the De Moor optimal-policy table as Figure 3, but the exact figure number was not independently confirmed because the EJOR full text is paywalled."
        - "Farrington Table 3 reports value-iteration return -1553 with standard deviation 61; only the rounded mean return is promoted as an executable comparator row."
    instance:
      reference_path: src/problems/perishable_inventory/references.rs
      reference_const: SCENARIO_A_REFERENCE_INSTANCES
      verification_reference_const: VERIFICATION_EXP1
      parameters:
        demand_mean: 4.0
        demand_cov: 0.50
        shelf_life: 2
        lead_time: 1
        shortage_cost: 5.0
        holding_cost: 1.0
        waste_cost: 7.0
        procurement_cost: 3.0
        max_order_size: 10
        issuing_policy: lifo
        horizon: 465
        eval_horizon: 365
    published_numbers:
      objective: discounted_return
      sign: higher_is_better
      rows:
        - label: value_iteration_mean_return
          policy_id: value_iteration
          metric: rounded_mean_return
          value: -1553
          params: null
          verification_status: strict_literature_verified
          notes: "Exact MDP re-derives the rounded published mean return."
        - label: best_base_stock_level
          policy_id: base_stock
          metric: base_stock_level
          value: 5
          params:
            S: 5
          verification_status: strict_literature_verified
          notes: "Exact MDP search recovers the published base-stock level."
        - label: optimal_policy_table
          policy_id: value_iteration
          metric: policy_table_9x9
          value: stored_in_reference_const
          params: null
          verification_status: strict_literature_verified
          notes: "The 9x9 table is stored in DE_MOOR_M2_EXP1_FIGURE3_POLICY and re-derived exactly by test."
      source_numbers_not_promoted:
        - "Farrington Table 3 reports return standard deviation 61; this registry does not promote std as a reproduced comparator metric."
    repo_verification:
      test: "src/problems/perishable_inventory/tests/verification.rs::m2_base_stock_levels_match_de_moor_figure_3 and ::m2_optimal_policies_match_de_moor_figure_3_and_2025_returns"
      command: cargo test m2_
      tolerance: "exact equality for base-stock level, policy table, and rounded integer mean return"
      reproduced_rows:
        - value_iteration
        - best_base_stock_level
        - optimal_policy_table
      table_only_rows: []
      artifact: src/problems/perishable_inventory/verification/README.md
    repo_baseline_gate:
      policy: "Exact value iteration versus tuned base_stock, bsp_low_ew, and CMA-ES soft tree."
      script: scripts/perishable_inventory/run_exact_slice_benchmark.py
      eval: "gamma=0.99; exact analytic MDP row plus Monte-Carlo heuristic/soft-tree rows; see report for seeds and estimator caveat."
      latest_report: src/problems/perishable_inventory/experiments/reports/exact_slice_report.md
      notes: "Gap-to-exact mixes analytic and Monte-Carlo estimators; gap-to-best-heuristic is the apples-to-apples gate."
    paper_link:
      section: "paper/sections/perishable_inventory.tex::sec:perishable and appendix app:perishable-validation"
      claim: "Exact LIFO m=2/L=1 perishable slice reproduces De Moor/Farrington anchors."
      caveats:
        - "Estimator caveat applies when comparing exact analytic return against Monte-Carlo heuristic and learned rows."
        - "Exact De Moor figure number remains unconfirmed; the policy table substance is verified."
    unknowns:
      - "Exact De Moor figure number for the optimal-policy table is not independently confirmed."

